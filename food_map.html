<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacific Science Center Food Map</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Encode Sans', 'Open Sans', sans-serif;
            background: linear-gradient(to bottom, #004A59, #00354A);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            font-family: 'Encode Sans', sans-serif;
            font-weight: 700;
            color: #FFFFFF;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 1.1em;
            font-family: 'Open Sans', sans-serif;
            color: #FFFFFF;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            margin-bottom: 30px;
        }

        .map-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 600px;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .sidebar-box {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }

        .sidebar-box h3 {
            font-size: 1.2em;
            font-family: 'Encode Sans', sans-serif;
            font-weight: 600;
            color: #139FDA;
            margin-bottom: 15px;
            border-bottom: 3px solid #139FDA;
            padding-bottom: 10px;
        }

        .category-filter {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 400px;
            overflow-y: auto;
        }

        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid #e2e8f0;
            font-size: 0.95em;
        }

        .category-item:hover {
            background-color: #f7fafc;
            transform: translateX(4px);
        }

        .category-item.active {
            background-color: #E8F4F8;
            border-left: 4px solid #139FDA;
            font-weight: 600;
        }

        .category-count {
            background-color: #edf2f7;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .legend {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 0.9em;
            max-height: 300px;
            overflow-y: auto;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 0.95em;
            color: #718096;
        }

        .venues-table {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 20px;
            overflow-x: auto;
        }

        .venues-table h2 {
            font-size: 1.5em;
            font-family: 'Encode Sans', sans-serif;
            font-weight: 600;
            color: #139FDA;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95em;
        }

        thead {
            background-color: #139FDA;
            border-bottom: 3px solid #004A59;
        }

        th {
            padding: 12px;
            text-align: left;
            font-family: 'Encode Sans', sans-serif;
            font-weight: 600;
            color: #FFFFFF;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        tbody tr:hover {
            background-color: #f7fafc;
        }

        .venue-name {
            font-weight: 600;
            color: #2d3748;
        }

        .venue-address {
            color: #718096;
            font-size: 0.9em;
        }

        .category-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 600;
            color: white;
        }

        .proximity-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75em;
            background-color: #e2e8f0;
            color: #2d3748;
            margin-left: 8px;
        }

        @media (max-width: 768px) {
            .content-grid {
                grid-template-columns: 1fr;
            }

            #map {
                height: 400px;
            }

            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>

            maxZoom: 17
        }).addTo(map);

        const pacSciIcon = L.icon({
            iconUrl: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><polygon points="50,10 61,40 92,40 67,60 78,90 50,70 22,90 33,60 8,40 39,40" fill="%23FFD700" stroke="%23FFA500" stroke-width="2"/></svg>',
            iconSize: [40, 40],
            iconAnchor: [20, 40],
            popupAnchor: [0, -40]
        });

        const pacSciMarker = L.marker([pacSciCenter.lat, pacSciCenter.lng], {
            icon: pacSciIcon
        }).addTo(map);

        pacSciMarker.bindPopup(`<strong>${pacSciCenter.name}</strong><br>Center of Map`, {
            className: 'custom-popup'
        });

        // Create markers for all venues
        const markers = {};
        venues.forEach(venue => {
            const color = categoryColors[venue.category];
            const marker = L.circleMarker([venue.lat, venue.lng], {
                radius: 7,
                fillColor: color,
                color: 'white',
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map);

            const popupContent = `<strong>${venue.name}</strong><br>${venue.address}<br><span style="color: ${color}; font-weight: bold;">${venue.category}</span>`;
            marker.bindPopup(popupContent);

            markers[venue.id] = marker;
        });

        // Calculate category statistics
        const categoryStats = {};
        venues.forEach(venue => {
            categoryStats[venue.category] = (categoryStats[venue.category] || 0) + 1;
        });

        const sortedCategories = Object.entries(categoryStats)
            .sort((a, b) => b[1] - a[1])
            .map(([category, count]) => ({ category, count }));

        let activeFilter = 'All';

        // Render category filter
        const categoryFilterDiv = document.getElementById('categoryFilter');
        const filterItems = [
            { category: 'All', count: venues.length },
            ...sortedCategories
        ];

        filterItems.forEach(item => {
            const div = document.createElement('div');
            div.className = 'category-item' + (item.category === 'All' ? ' active' : '');
            div.innerHTML = `
                <span>${item.category}</span>
                <span class="category-count">${item.count}</span>
            `;
            div.addEventListener('click', () => {
                document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
                activeFilter = item.category;
                filterVenues();
            });
            categoryFilterDiv.appendChild(div);
        });

        sortedCategories.forEach(item => {
            const div = document.createElement('div');
            div.className = 'legend-item';
            div.innerHTML = `
                <div class="legend-color" style="background-color: ${categoryColors[item.category]}"></div>
                <span>${item.category} (${item.count})</span>
            `;
            legendDiv.appendChild(div);
        });

        // Filter venues function
        function filterVenues() {
            venues.forEach(venue => {
                const marker = markers[venue.id];
                if (activeFilter === 'All' || venue.category === activeFilter) {
                    marker.setStyle({ opacity: 1, fillOpacity: 0.8 });
                    marker.addTo(map);
                } else {
                    map.removeLayer(marker);
                }
            });

            // Update table
            renderVenuesTable();
        }

        // Render venues table
        function renderVenuesTable() {
            const tbody = document.getElementById('venuesTableBody');
            tbody.innerHTML = '';

            const filteredVenues = activeFilter === 'All'
                ? venues
                : venues.filter(v => v.category === activeFilter);

            document.getElementById('venueCount').textContent = filteredVenues.length;

            filteredVenues.forEach(venue => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="venue-name">${venue.name}</td>
                    <td class="venue-address">${venue.address}</td>
                    <td>
                        <span class="category-badge" style="background-color: ${categoryColors[venue.category]}">
                            ${venue.category}
                        </span>
                    </td>
                    <td><span class="proximity-badge">${venue.zone}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Render stats
        const statsGrid = document.getElementById('statsGrid');
        statsGrid.innerHTML = `
            <div class="stat-card">
                <div class="stat-number">${venues.length}</div>
                <div class="stat-label">Total Venues</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${sortedCategories.length}</div>
                <div class="stat-label">Food Categories</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${sortedCategories[0].count}</div>
                <div class="stat-label">Most Common: ${sortedCategories[0].category}</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">~0.5mi</div>
                <div class="stat-label">Typical Radius</div>
            </div>
        `;

        // Initial table render
        renderVenuesTable();
    </script>
</body>
</html>
